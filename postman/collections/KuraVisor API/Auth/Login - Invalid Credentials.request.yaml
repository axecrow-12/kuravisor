$kind: http-request
name: 'Login - Invalid Credentials'
method: POST
url: '{{base_url}}/api/auth/login'
order: 2500
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "nonexistent@example.com",
      "password": "wrongpassword"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Test: Status code should be 401 for invalid credentials
      pm.test("Status code is 401 Unauthorized", function () {
          pm.response.to.have.status(401);
      });

      // Test: Response time should be under 2 seconds
      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      // Test: Response should be JSON
      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      // Test: Error message is present
      pm.test("Error response has message", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("message");
          pm.expect(jsonData.message).to.include("Invalid credentials");
      });

      // Test: No token should be returned
      pm.test("No token in error response", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.not.have.property("token");
      });
