$kind: http-request
name: Get Profile
method: GET
url: '{{base_url}}/api/profile'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{auth_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Test: Status code should be 200 for authenticated request
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      // Test: Response time should be under 2 seconds
      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      // Test: Response should be JSON
      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      // Test: Response body structure
      pm.test("Response has required fields", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("message");
          pm.expect(jsonData).to.have.property("user");
      });

      // Test: User object from token
      pm.test("User object has token payload fields", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.user).to.have.property("userId");
          pm.expect(jsonData.user).to.have.property("email");
      });
