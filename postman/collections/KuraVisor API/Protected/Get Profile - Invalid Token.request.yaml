$kind: http-request
name: 'Get Profile - Invalid Token'
method: GET
url: '{{base_url}}/api/profile'
order: 3600
headers:
  - key: Authorization
    value: 'Bearer invalid.token.here'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Test: Status code should be 403 for invalid token
      pm.test("Status code is 403 Forbidden", function () {
          pm.response.to.have.status(403);
      });

      // Test: Response time should be under 2 seconds
      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      // Test: Response should be JSON
      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      // Test: Error message about invalid token
      pm.test("Error message indicates invalid token", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("message");
          pm.expect(jsonData.message.toLowerCase()).to.satisfy(function(msg) {
              return msg.includes("invalid") || msg.includes("expired") || msg.includes("token");
          });
      });
